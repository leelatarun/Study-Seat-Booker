openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lucky Reading Room - Library Seat Booking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: seats
    description: Seat management
  - name: bookings
    description: Booking management
  - name: payments
    description: Payment processing
  - name: pricing
    description: Pricing configuration
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /seats:
    get:
      operationId: listSeats
      tags: [seats]
      summary: List all seats with availability for a date range or month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "Month in YYYY-MM format (legacy, e.g. 2026-07)"
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            description: "Date-range start YYYY-MM-DD — seats booked for any overlapping period are shown as occupied"
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            description: "Date-range end YYYY-MM-DD (inclusive)"
      responses:
        "200":
          description: List of seats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seat"

  /seats/{id}:
    get:
      operationId: getSeat
      tags: [seats]
      summary: Get a seat by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seat details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Seat"
        "404":
          description: Seat not found

    patch:
      operationId: updateSeat
      tags: [seats]
      summary: Admin - toggle seat offline booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeatUpdate"
      responses:
        "200":
          description: Updated seat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Seat"
        "401":
          description: Unauthorized

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings (admin)
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "Month in YYYY-MM format"
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Invalid input or seat unavailable
        "409":
          description: Seat already booked for this period

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Admin - update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/summary:
    get:
      operationId: getBookingSummary
      tags: [bookings]
      summary: Get booking statistics for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            description: "Month in YYYY-MM format"
      responses:
        "200":
          description: Booking summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSummary"

  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Record that payment was initiated (UPI flow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitiate"
      responses:
        "200":
          description: Payment session acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSession"
        "404":
          description: Booking not found

  /pricing:
    get:
      operationId: getPricing
      tags: [pricing]
      summary: Get current pricing
      responses:
        "200":
          description: Current pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"

    patch:
      operationId: updatePricing
      tags: [pricing]
      summary: Admin - update pricing and room settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingUpdate"
      responses:
        "200":
          description: Updated pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"
        "401":
          description: Unauthorized

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Invalid credentials

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Seat:
      type: object
      required: [id, seatNumber, section, room, isAC, isOfflineBooked, price]
      properties:
        id:
          type: integer
        seatNumber:
          type: integer
        section:
          type: string
          description: "AC or NON_AC"
        room:
          type: integer
          description: "1=AC room, 2=Non-AC/switchable room, 3=Common area"
        isAC:
          type: boolean
        isOfflineBooked:
          type: boolean
          description: "True if seat was booked offline at the admin desk"
        offlineBookingName:
          type: ["string", "null"]
        offlineBookingPhone:
          type: ["string", "null"]
        offlineBookingFrom:
          type: ["string", "null"]
          description: "YYYY-MM-DD start date for offline booking"
        offlineBookingUntil:
          type: ["string", "null"]
          description: "YYYY-MM-DD end date for offline booking"
        price:
          type: number
          description: "1-month price for this seat"
        bookedForMonth:
          type: ["boolean", "null"]
          description: "True if this seat is booked for the queried month"
        bookingId:
          type: ["integer", "null"]
        bookedByName:
          type: ["string", "null"]

    SeatUpdate:
      type: object
      properties:
        isOfflineBooked:
          type: boolean
        offlineBookingName:
          type: string
          nullable: true
        offlineBookingPhone:
          type: string
          nullable: true
        offlineBookingFrom:
          type: string
          nullable: true
        offlineBookingUntil:
          type: string
          nullable: true

    Booking:
      type: object
      required: [id, seatId, seatNumber, section, customerName, customerPhone, month, endMonth, durationMonths, amount, status, createdAt]
      properties:
        id:
          type: integer
        seatId:
          type: integer
        seatNumber:
          type: integer
        section:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
          description: "YYYY-MM-DD booking start date"
        endDate:
          type: ["string", "null"]
          description: "YYYY-MM-DD booking end date (inclusive)"
        month:
          type: string
          description: "YYYY-MM start month (derived from startDate)"
        endMonth:
          type: string
          description: "YYYY-MM last month of booking (derived from endDate)"
        durationMonths:
          type: integer
        amount:
          type: number
        status:
          type: string
          description: "pending | confirmed | cancelled"
        startDay:
          type: ["integer", "null"]
        paymentDate:
          type: ["string", "null"]
          description: "YYYY-MM-DD when payment was confirmed"
        paymentSessionId:
          type: ["string", "null"]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [seatId, customerName, customerPhone, startDate, endDate]
      properties:
        seatId:
          type: integer
        customerName:
          type: string
          minLength: 2
        customerPhone:
          type: string
          minLength: 10
        customerEmail:
          type: string
        startDate:
          type: string
          description: "Booking start date YYYY-MM-DD (must not be in the past)"
        endDate:
          type: string
          description: "Booking end date YYYY-MM-DD (inclusive, must be >= startDate)"

    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          description: "pending | confirmed | cancelled"

    BookingSummary:
      type: object
      required: [month, totalSeats, bookedSeats, availableSeats, acBooked, nonAcBooked, revenue]
      properties:
        month:
          type: string
        totalSeats:
          type: integer
        bookedSeats:
          type: integer
        availableSeats:
          type: integer
        acBooked:
          type: integer
        nonAcBooked:
          type: integer
        revenue:
          type: number

    PaymentInitiate:
      type: object
      required: [bookingId]
      properties:
        bookingId:
          type: integer

    PaymentSession:
      type: object
      required: [sessionId, bookingId, amount, expiresAt]
      properties:
        sessionId:
          type: string
        bookingId:
          type: integer
        amount:
          type: number
        expiresAt:
          type: string

    Pricing:
      type: object
      required: [id, acPrice1m, acPrice2m, acPrice3m, acPrice6m, nonAcPrice1m, nonAcPrice2m, nonAcPrice3m, nonAcPrice6m, room2IsAc, updatedAt]
      properties:
        id:
          type: integer
        acPrice1m:
          type: integer
        acPrice2m:
          type: integer
        acPrice3m:
          type: integer
        acPrice6m:
          type: integer
        nonAcPrice1m:
          type: integer
        nonAcPrice2m:
          type: integer
        nonAcPrice3m:
          type: integer
        nonAcPrice6m:
          type: integer
        room2IsAc:
          type: boolean
        updatedAt:
          type: string

    PricingUpdate:
      type: object
      properties:
        acPrice1m:
          type: integer
        acPrice2m:
          type: integer
        acPrice3m:
          type: integer
        acPrice6m:
          type: integer
        nonAcPrice1m:
          type: integer
        nonAcPrice2m:
          type: integer
        nonAcPrice3m:
          type: integer
        nonAcPrice6m:
          type: integer
        room2IsAc:
          type: boolean

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [success, token]
      properties:
        success:
          type: boolean
        token:
          type: string
